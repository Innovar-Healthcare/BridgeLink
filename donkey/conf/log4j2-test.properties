# Log4j 2.x Test Configuration for SLF4J Bridge Testing
# This configuration ensures HikariCP and Quartz logs are captured during testing

# Root logger configuration
rootLogger.level = DEBUG
rootLogger.appenderRef.stdout.ref = STDOUT

# Console appender for visual verification
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %-5p %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1}: %m%n

# HikariCP logger - should log via SLF4J → log4j-slf4j2-impl → Log4j 2.x
logger.hikari.name = com.zaxxer.hikari
logger.hikari.level = DEBUG
logger.hikari.additivity = true

# Quartz logger - should log via SLF4J → log4j-slf4j2-impl → Log4j 2.x
logger.quartz.name = org.quartz
logger.quartz.level = DEBUG
logger.quartz.additivity = true

# SLF4J implementation logger
logger.slf4j.name = org.apache.logging.slf4j
logger.slf4j.level = DEBUG
logger.slf4j.additivity = true

# Test logger
logger.test.name = com.mirth.connect.donkey.test
logger.test.level = DEBUG
logger.test.additivity = true
